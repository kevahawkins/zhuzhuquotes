document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  &quot;background&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;cream&quot;, &quot;options&quot;: [&quot;cream&quot;, &quot;blush&quot;, &quot;sky&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Атмосфера&quot;},\n  &quot;glow&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.85, &quot;min&quot;: 0, &quot;max&quot;: 1.8, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Атмосфера&quot;},\n  &quot;candySize&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 118, &quot;min&quot;: 64, &quot;max&quot;: 170, &quot;step&quot;: 2, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Атмосфера&quot;},\n  &quot;motion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Поведение&quot;},\n  &quot;sound&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Поведение&quot;}\n}\">\nconst NOTES = [\n  \"Мне нравится, как пишет Жужу. ЕСЛИ БЫ Я НЕ БОЯЛСЯ Я БЫ ПОДКАТИЛ\",\n  \"— Вы общаетесь?\\n— Нет, но хотелось бы\",\n  \"— И НА КОГО ЭТО ТЫ ТАМ ГЛАЗ ПОЛОЖИЛ?\\n— вот если получится склеить - узнаешь!\\n— КТО\\n— она похожа на пчёлку\",\n  \"жужу сказала, что вдохновлялась моей анкетой, когда писала свою. ЧТО БЫ ЭТО ЗНАЧИЛО????\\n— неужели вы замутите?\",\n  \"*потом я нашел песню получше, ноооо*\\nя отправлю анонимный заказ жужу с песней arctic monkeys - I bet you look good on the dance floor, как отсылка к балу\\nона будет думать, от кого же это....\\nА Я ВСТАВЛЮ СТРОЧКУ ИЗ ЭТОЙ ПЕСНИ СЕБЕ В ЛЗ\\nтипа так НЕНАВЯЗЧИВО\",\n  \"ПОДАРИТЕ МНЕ КЛЮЧИ ОТ ВАННОЙ СТАРОСТ\\n—  Ты сам должен подарить их Жужу\\n—  СЛИШКОМ АГРЕССИВНЫЙ ПОДКАТ\",\n  \"—  опаааа, Жужу лайнула \\u201CСвидания вслепую\\u201D. ДА Я СТАЛКЕР И ЧТО\",\n  \"— АААААААААААА\\n— А ЧЕ МЕНЯ ТАК КРОЕТ НЕ ПОНИМАЮ\\n— Я КАК ИДИОТ СИЖУ РАДОСТНЫЙ\\n— Ох уж эти влюбленные подростки!\",\n  \"Ладно, если до этого Жужу мне просто нравилась, то после ее поста я, кажется, влюбился 🥺\",\n  \"— у тебя есть жужу!!\\n— ЖУЖУ У МЕНЯ ПОКА ЧТО НЕТ!!\",\n  \"Мне кажется, я в ОГ навалил кринжа… И поэтому Жужу не пишет мне пост…\\n*спустя 46 минут*\\nона все еще не написала............\\nа, прошло меньше часа\\nмне показалось, что три\\n*спустя 31 минуту*\\nдумаю, она меня бросила\",\n  \"— Это я не поворчал про комнату! Сначала кузина. Теперь ты ведешь какую-то девушку в нашу комнату! Ужас!\\n— НУ А ШО ПОДЕЛАТЬ ЕСЛИ ВСЕ РОМАНТИШНЫЕ МЕСТА ЗАНЯТЫ\\n— ОСВОБОЖДАЙ\\n— Заодно смогу понтоваться, что привел девушку в башню гриффиндора на первом же свидании 🌚\",\n  \"вчера почти до 3 ночи писал простынь жужу и теперь переживаю, что отпугнул ее размерами ахахахаха\",\n  \"ты не знаешь, у ананель с жужу какие-то мутки? каждый раз, когда я пытаюсь что-то написать жужу, она странно реагирует\",\n  \"…встречаться с классной Жужу, потому что мне она правда искренне нравится и успела стать мне дорога. у других людей может быть какое угодно к ней отношение, и это их дело, но мне с ней классно. я вижу в ней того человека, с которым мне радостно находиться рядом.\",\n  \"Только вечером угарали на ГФ по поводу того, что мне снилась Грэйс... МНЕ СЕЙЧАС ПРИСНИЛАСЬ ХЕЛЕНА\\nОна пришла ко мне и ОЧЕНЬ СТРОГО спрашивала, какие у меня намерения относительно ее сестры, и пригрозила, что если они недостаточно серьезные, мне пизда\",\n  \"все, что даже косвенно связано с жужу, мне интересно\",\n  \"— выводы сделаны, отношение увижено\\n— ухожу от вас в монастырь\\n— Так там нет твоей обожаемой Жужу\\n— ДА Я ВАЩЕТ ТУДА МОЛИТЬСЯ А НЕ ГРЕШИТЬ\",\n  \"Все раздражают. И ты, когда говоришь о Жужу 30 часов в сутки - тоже\",\n  \"Мне в этом плане с Жужу повезло… ладно, не только в этом, а просто ахах\",\n  \"мне нужна причина появиться в ОГ, потому что там жужу, но я не могу туда пойти, ПОТОМУ ЧТО ТАМ ЖУЖУ\",\n  \"— жужу спросила \\\"чай или кофе?\\u201D\\n— это какой-то код?\\n— Я НАСТОЛЬКО ИСПОРЧЕННЫЙ ДА?\\n— КЕВИН!!!\",\n  \"— Если я буду с тобой, пойдешь пить огневиски? Один я точно не пойду, у меня есть девушка\\n— а ванная там для чего?\\n— Видимо от меня воняет. Я как раз с пробежки, за Жужу бегал\",\n  \"Сегодня снилось, что Жужу завела себе какого-то мерзкого мужика на стороне 👺\",\n  \"я понимаю, что мне действительно очень дорога жужу. да, я говорил об этом и до этого, но сейчас я как никогда раньше это осознаю. и если раньше страх потерять это был больше иллюзорным, потому что все только начиналось и мне было жаль терять приятного человека, который мне искренне нравился, то сейчас он стал вполне реальным. в свою сторону от них я чувствую только тепло, любовь и открытость\",\n  \"— А жениться на Жужу хочешь?\\n— Как-то рановато\\n— Ну ты говорил сегодня про жену\\n— Ну у меня в любом случае когда-то будет жена! Просто пока что рано говорить какие-то имена! Хотя… мы на первом же свидании обвенчались 😅\",\n  \"я переезжаю на когтевран...........\",\n  \"— Мне сказали будет много сов и котиков в шаблонах 😁\\n— ХМММ ИНТЕРЕСНО ПОЧЕМУ\",\n  \"не понял, причем тут Джульетта, но не деритесь, она уже со мной 💅🏻\",\n  \"— прошло 5 часов и 34 минуты, как мне не отвечают на пост\\n— у меня ломка\\n— ВЫ ГДЕ БРОСИЛИ ВЫ БРОСИЛИ МЕНЯ БРОСИЛИ ДОБРОЕ УТРО БРОСИЛИ ОТВЕТЬТЕ БРОСИЛИ\",\n];\n\nconst DATES = [\n  \"29.12.2025\",\"09.01.2026\",\"15.01.2026\",\"18.01.2026\",\"24.01.2026\",\n  \"01.02.2026\",\"01.02.2026\",\"06.02.2026\",\"06.02.2026\",\"06.02.2026\",\n  \"08.02.2026\",\"09.02.2026\",\"10.02.2026\",\"12.02.2026\",\"31.03.2026\",\n  \"15.02.2026\",\"16.02.2026\",\"16.02.2026\",\"16.02.2026\",\"12.02.2026\",\n  \"17.02.2026\",\"04.03.2026\",\"14.03.2026\",\"23.03.2026\",\"24.04.2026\",\n  \"19.03.2026\",\"19.03.2026\",\"16.02.2026\",\"12.04.2026\",\"06.02.2026\",\n];\n\nconst FINAL_NOTE = \"Прошло столько времени, а я все еще говорю о тебе, не заты
